<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 消消乐 - Match 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:"Microsoft YaHei","PingFang SC",sans-serif;overflow-y:auto;
  user-select:none;-webkit-user-select:none;padding:16px;
}
.wrapper{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;justify-content:center;max-width:820px}
h1{color:#fff;font-size:clamp(20px,3vw,30px);text-align:center;width:100%;text-shadow:0 0 20px rgba(255,200,50,.5);letter-spacing:4px;margin-bottom:4px}
.header{width:100%;text-align:center}
.board-area{display:flex;flex-direction:column;align-items:center;position:relative}
#shake-wrap{transition:transform .05s}
#game-container{
  background:rgba(255,255,255,.04);border-radius:16px;padding:8px;
  box-shadow:0 0 40px rgba(100,150,255,.15),inset 0 0 20px rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.08);position:relative;
}
canvas{display:block;border-radius:10px;touch-action:manipulation;cursor:pointer}
#overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;display:flex;align-items:center;justify-content:center;
  font-size:clamp(36px,8vw,64px);font-weight:900;color:#ffd700;
  text-shadow:0 0 30px rgba(255,200,0,.8);z-index:10;
}
#overlay.interactive{pointer-events:auto}
#overlay button{
  pointer-events:auto;margin:10px;padding:12px 28px;font-size:18px;border:none;
  border-radius:25px;cursor:pointer;font-weight:700;transition:all .2s;color:#fff;
}
.btn-next{background:linear-gradient(135deg,#4caf50,#2e7d32);box-shadow:0 4px 15px rgba(76,175,80,.5)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(76,175,80,.7)}
.btn-retry{background:linear-gradient(135deg,#ff6b6b,#c62828);box-shadow:0 4px 15px rgba(255,107,107,.5)}
.btn-retry:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,107,.7)}
.btn-restart{background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 4px 15px rgba(102,126,234,.5)}
.btn-restart:hover{transform:translateY(-2px)}
.sidebar{
  background:rgba(255,255,255,.06);border-radius:16px;padding:18px;
  border:1px solid rgba(255,255,255,.1);color:#ddd;min-width:230px;
  max-width:260px;font-size:13px;line-height:1.7;
  box-shadow:0 0 30px rgba(100,150,255,.1);
}
.sidebar h3{color:#ffd700;font-size:16px;margin-bottom:8px;text-align:center}
.sidebar h4{color:#ff9944;margin:10px 0 5px;font-size:13px}
.sidebar p{margin-bottom:3px;color:#bbb}
.power-item{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  background:rgba(255,255,255,.05);border-radius:8px;margin-bottom:4px;
  cursor:pointer;transition:all .15s;border:1px solid transparent;
  position:relative;overflow:hidden;
}
.power-item:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
.power-item .icon{font-size:20px}
.power-item .name{flex:1;font-size:11px;line-height:1.3}
.power-item .count{color:#ffd700;font-weight:700;font-size:14px}
.power-item.active{border-color:#ffd700!important;box-shadow:0 0 12px rgba(255,200,0,.4)}
.power-item .pg-bg{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.1);width:100%}
.power-item .pg-fill{height:100%;transition:width .3s}
.pg-bomb{background:#ff6b6b!important}.pg-meteor{background:#ffd700!important}
.pg-rainbow{background:linear-gradient(90deg,red,orange,yellow,green,blue,purple)!important}
.pg-hammer{background:#64b5f6!important}
.level-bar{display:flex;gap:4px;margin:8px 0;justify-content:center}
.level-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.level-dot.done{background:#4caf50;box-shadow:0 0 8px rgba(76,175,80,.5)}
.level-dot.current{background:#ffd700;box-shadow:0 0 10px rgba(255,200,0,.6)}
.info-row{display:flex;justify-content:space-between;margin:2px 0}
.info-row .val{color:#fff;font-weight:700}
.progress-bg{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:6px 0}
.progress-fill{background:linear-gradient(90deg,#ff6b6b,#ffd700);height:100%;border-radius:10px;transition:width .3s}
.timer-row .val.warn{color:#ff6b6b;animation:pulse .5s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.4}}
.floating-text{
  position:fixed;pointer-events:none;font-weight:900;font-size:26px;
  color:#ffd700;text-shadow:0 0 10px rgba(255,200,0,.8);z-index:100;
  animation:floatUp .9s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-70px) scale(1.4)}
}
.shake{animation:shake .4s ease-out}
@keyframes shake{
  0%,100%{transform:translate(0)}
  10%{transform:translate(-6px,3px)}
  20%{transform:translate(5px,-4px)}
  30%{transform:translate(-4px,2px)}
  40%{transform:translate(3px,-1px)}
  50%{transform:translate(-2px,2px)}
  60%{transform:translate(1px,-1px)}
  70%{transform:translate(-1px,0)}
}
.confetti{
  position:fixed;pointer-events:none;z-index:200;animation:confettiFall 2s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(105vh) rotate(720deg);opacity:0}
}
</style>
</head>
<body>
<div class="wrapper">
<div class="header"><h1>✨ 消消乐</h1></div>
<div class="board-area">
<div id="shake-wrap"><div id="game-container">
<canvas id="c"></canvas>
<div id="overlay"></div>
</div></div>
<div class="level-bar" id="levelDots"></div>
</div>
<div class="sidebar" id="sidebar">
<h3>📖 游戏说明</h3>
<p>点击宝石选中，再点<span style="color:#ffd700">相邻</span>宝石交换</p>
<p>三个以上同色连成一线即消除得分</p>
<p style="color:#ff9944">⚠ 每关有时间限制！</p>
<h4>🎯 道具（消除宝石积攒）</h4>
<div class="power-item" id="powBomb" onclick="activatePower('bomb')">
<span class="icon">💣</span><span class="name">炸弹·炸3×3</span><span class="count" id="cntBomb">0</span>
<div class="pg-bg"><div class="pg-fill pg-bomb" id="progBomb" style="width:0%"></div></div>
</div>
<div class="power-item" id="powMeteor" onclick="activatePower('meteor')">
<span class="icon">☄️</span><span class="name">流星·随机5个</span><span class="count" id="cntMeteor">0</span>
<div class="pg-bg"><div class="pg-fill pg-meteor" id="progMeteor" style="width:0%"></div></div>
</div>
<div class="power-item" id="powHammer" onclick="activatePower('hammer')">
<span class="icon">🔨</span><span class="name">锤子·十字范围</span><span class="count" id="cntHammer">0</span>
<div class="pg-bg"><div class="pg-fill pg-hammer" id="progHammer" style="width:0%"></div></div>
</div>
<div class="power-item" id="powRainbow" onclick="activatePower('rainbow')">
<span class="icon">🌈</span><span class="name">彩虹·清一种色</span><span class="count" id="cntRainbow">0</span>
<div class="pg-bg"><div class="pg-fill pg-rainbow" id="progRainbow" style="width:0%"></div></div>
</div>
<h4>🏆 关卡</h4>
<div id="levelInfo"></div>
<div class="progress-bg"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
<div class="info-row"><span>得分</span><span class="val" id="score">0</span></div>
<div class="info-row"><span>目标</span><span class="val" id="target">500</span></div>
<div class="info-row"><span>连击</span><span class="val" id="comboDisp">x1</span></div>
<div class="info-row timer-row"><span>⏱ 剩余时间</span><span class="val" id="timerDisp">120s</span></div>
</div>
</div>

<script>
// ============ CONFIG ============
const LEVELS=[
  {rows:8,cols:8,colors:5,target:500, time:120, name:"新手村"},
  {rows:8,cols:8,colors:6,target:1000,time:110, name:"小试牛刀"},
  {rows:9,cols:9,colors:6,target:2000,time:100, name:"渐入佳境"},
  {rows:9,cols:9,colors:7,target:3500,time:90,  name:"高手过招"},
  {rows:10,cols:10,colors:7,target:5000,time:80, name:"终极挑战"},
];
const POWER_THRESHOLDS={bomb:20,meteor:30,hammer:25,rainbow:50};

const GEM_COLORS=[
  ["#ff4444","#ff7777","#cc0000"],
  ["#ff8800","#ffbb44","#cc6600"],
  ["#ffdd00","#ffee66","#ccaa00"],
  ["#44cc44","#77ee77","#228822"],
  ["#4488ff","#77bbff","#0044cc"],
  ["#cc44ff","#dd88ff","#8800cc"],
  ["#ff6699","#ff99bb","#cc3366"],
];

let grid=[],rows,cols,numColors,score=0,target=0,combo=0,level=0;
let selR=-1,selC=-1,animating=false,paused=false;
let powerMode=null,powerCounts={bomb:1,meteor:1,rainbow:0,hammer:1};
let gemsForPower={bomb:0,meteor:0,hammer:0,rainbow:0};
let totalScore=0,swapR1=-1,swapC1=-1,swapR2=-1,swapC2=-1,swapT=0;
let timeLeft=120,timerInterval=null,levelFailed=false;
let particles=[],confettiPieces=[];

const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
const overlay=document.getElementById("overlay");
const shakeWrap=document.getElementById("shake-wrap");
let CELL,gap;

// ============ AUDIO ============
const AudioCtx=window.AudioContext||window.webkitAudioContext;let actx;
function beep(freq,dur,type="square",vol=.06){
  if(!actx)actx=new AudioCtx();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function sfxSelect(){beep(600,.08,"sine",.05)}
function sfxSwap(){beep(400,.06,"triangle",.04);setTimeout(()=>beep(600,.06,"triangle",.04),60)}
function sfxMatch(n){beep(500+n*60,.1,"square",.06)}
function sfxFail(){beep(150,.15,"sawtooth",.04)}
// distinct power-up sounds
function sfxBomb(){beep(60,.25,"sawtooth",.12);setTimeout(()=>beep(40,.3,"sawtooth",.1),100);setTimeout(()=>beep(30,.35,"sawtooth",.08),200)}
function sfxMeteor(){beep(800,.06,"sine",.05);setTimeout(()=>beep(1000,.06,"sine",.05),50);setTimeout(()=>beep(1200,.06,"sine",.05),100);setTimeout(()=>beep(600,.15,"triangle",.06),150)}
function sfxHammer(){beep(200,.1,"triangle",.08);setTimeout(()=>beep(150,.12,"triangle",.06),80)}
function sfxRainbow(){beep(523,.08,"sine",.06);setTimeout(()=>beep(659,.08,"sine",.06),70);setTimeout(()=>beep(784,.08,"sine",.06),140);setTimeout(()=>beep(1047,.15,"sine",.07),210)}
function sfxLevelUp(){beep(523,.1,"sine",.08);setTimeout(()=>beep(659,.1,"sine",.08),100);setTimeout(()=>beep(784,.15,"sine",.08),200);setTimeout(()=>beep(1047,.2,"sine",.08),300)}
function sfxCountdown(){beep(440,.15,"sine",.07)}
function sfxGo(){beep(880,.25,"sine",.1)}
function sfxTimeUp(){beep(200,.2,"sawtooth",.08);setTimeout(()=>beep(150,.3,"sawtooth",.06),200)}

// ============ RESIZE ============
function resize(){
  const maxW=Math.min(window.innerWidth-310,420);
  const maxH=Math.min(window.innerHeight-180,420);
  const size=Math.min(maxW,maxH);
  const c=LEVELS[level].cols,r=LEVELS[level].rows;
  gap=Math.floor(size*.025);
  CELL=Math.floor((size-gap*(c+1))/Math.max(c,r));
  canvas.width=CELL*c+gap*(c+1);
  canvas.height=CELL*r+gap*(r+1);
}
window.addEventListener("resize",()=>{resize();draw()});

// ============ GRID ============
function newGrid(){
  rows=LEVELS[level].rows;cols=LEVELS[level].cols;numColors=LEVELS[level].colors;
  grid=Array.from({length:rows},()=>Array.from({length:cols},()=>randCol()));
  while(hasMatches()){for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isMatch(r,c))grid[r][c]=randCol()}
}
function randCol(){return Math.floor(Math.random()*numColors)}
function hasMatches(){
  for(let r=0;r<rows;r++)for(let c=0;c<cols-2;c++)if(grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2])return true;
  for(let r=0;r<rows-2;r++)for(let c=0;c<cols;c++)if(grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c])return true;
  return false
}
function isMatch(r,c){
  const v=grid[r][c];if(v<0)return false;
  if(c<cols-2&&v===grid[r][c+1]&&v===grid[r][c+2])return true;
  if(c>0&&c<cols-1&&v===grid[r][c-1]&&v===grid[r][c+1])return true;
  if(c>1&&v===grid[r][c-2]&&v===grid[r][c-1])return true;
  if(r<rows-2&&v===grid[r+1][c]&&v===grid[r+2][c])return true;
  if(r>0&&r<rows-1&&v===grid[r-1][c]&&v===grid[r+1][c])return true;
  if(r>1&&v===grid[r-2][c]&&v===grid[r-1][c])return true;
  return false
}
function findMatches(){
  const m=new Set();
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isMatch(r,c))m.add(r+","+c);
  return m
}

// ============ PARTICLES ============
function spawnParticles(x,y,count,color,spd){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const s=Math.random()*spd+spd*.3;
    particles.push({x,y,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s,life:1,decay:.02+Math.random()*.03,color,size:3+Math.random()*5});
  }
}
function spawnConfetti(){
  const colors=["#ff4444","#ff8800","#ffdd00","#44cc44","#4488ff","#cc44ff","#ff6699","#ffd700"];
  for(let i=0;i<80;i++){
    confettiPieces.push({
      x:Math.random()*window.innerWidth,y:-20-Math.random()*100,
      vx:(Math.random()-.5)*4,vy:3+Math.random()*5,
      color:colors[Math.floor(Math.random()*colors.length)],
      size:6+Math.random()*8,rotation:Math.random()*360,rotSpd:(Math.random()-.5)*10
    });
  }
  requestAnimationFrame(animateConfetti);
}
function animateConfetti(){
  ctx.save();
  for(let i=confettiPieces.length-1;i>=0;i--){
    const p=confettiPieces[i];p.y+=p.vy;p.x+=p.vx;p.rotation+=p.rotSpd;
    ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.size,p.size*.6);
    if(p.y>window.innerHeight+50)confettiPieces.splice(i,1);
  }
  ctx.restore();
  if(confettiPieces.length>0)requestAnimationFrame(animateConfetti);
}

// ============ SHAKE ============
function doShake(intensity){
  shakeWrap.classList.remove("shake");
  void shakeWrap.offsetWidth;
  shakeWrap.style.setProperty("--intensity",intensity+"px");
  shakeWrap.classList.add("shake");
  setTimeout(()=>shakeWrap.classList.remove("shake"),400);
}

// ============ DRAW ============
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=gap+c*(CELL+gap),y=gap+r*(CELL+gap);
    const v=grid[r][c];
    ctx.fillStyle=(r+c)%2===0?"rgba(255,255,255,.04)":"rgba(0,0,0,.08)";
    ctx.beginPath();roundRect(x,y,CELL,CELL,6);ctx.fill();
    if(v>=0){
      const pal=GEM_COLORS[v];
      const grad=ctx.createRadialGradient(x+CELL*.35,y+CELL*.3,CELL*.05,x+CELL*.5,y+CELL*.5,CELL*.55);
      grad.addColorStop(0,pal[1]);grad.addColorStop(.7,pal[0]);grad.addColorStop(1,pal[2]);
      ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,CELL*.38,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.25)";
      ctx.beginPath();ctx.arc(x+CELL*.38,y+CELL*.35,CELL*.12,0,Math.PI*2);ctx.fill();
    }
    if((r===selR&&c===selC)||(r===swapR1&&c===swapC1)){
      ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.shadowColor="rgba(255,255,255,.8)";ctx.shadowBlur=10;
      ctx.beginPath();roundRect(x-1,y-1,CELL+2,CELL+2,8);ctx.stroke();ctx.shadowBlur=0;
    }
  }
  // swap anim
  if(swapR1>=0&&swapR2>=0){
    let t=Math.min(1,(Date.now()-swapT)/180);
    const x1=gap+swapC1*(CELL+gap),y1=gap+swapR1*(CELL+gap);
    const x2=gap+swapC2*(CELL+gap),y2=gap+swapR2*(CELL+gap);
    drawGem(grid[swapR2]?.[swapC2]??-1,x1+(x2-x1)*t,y1+(y2-y1)*t);
    drawGem(grid[swapR1]?.[swapC1]??-1,x2+(x1-x2)*t,y2+(y1-y2)*t);
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawGem(v,x,y){
  if(v<0)return;
  const pal=GEM_COLORS[v];
  const grad=ctx.createRadialGradient(x+CELL*.35,y+CELL*.3,CELL*.05,x+CELL*.5,y+CELL*.5,CELL*.55);
  grad.addColorStop(0,pal[1]);grad.addColorStop(.7,pal[0]);grad.addColorStop(1,pal[2]);
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,CELL*.38,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.25)";
  ctx.beginPath();ctx.arc(x+CELL*.38,y+CELL*.35,CELL*.12,0,Math.PI*2);ctx.fill();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ============ SWAP ============
async function doSwap(r1,c1,r2,c2){
  [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
  return findMatches().size>0;
}

// ============ POWER EFFECTS ============
function applyBomb(r,c){
  const changed=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]>=0){changed.push([nr,nc]);grid[nr][nc]=-1}
  }
  const rect=canvas.getBoundingClientRect();
  const px=rect.left+gap+c*(CELL+gap)+CELL/2,py=rect.top+gap+r*(CELL+gap)+CELL/2;
  spawnParticles(px,py,25,"#ff6b6b",CELL*.6);
  spawnParticles(px,py,15,"#ffd700",CELL*.4);
  doShake(8);sfxBomb();
  return changed.length;
}
function applyMeteor(){
  const candidates=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(grid[r][c]>=0)candidates.push([r,c]);
  shuffle(candidates);
  const count=Math.min(5,candidates.length);
  const rect=canvas.getBoundingClientRect();
  for(let i=0;i<count;i++){
    const[r,c]=candidates[i];grid[r][c]=-1;
    const px=rect.left+gap+c*(CELL+gap)+CELL/2,py=rect.top+gap+r*(CELL+gap)+CELL/2;
    setTimeout(()=>{spawnParticles(px,py,8,"#ffd700",CELL*.3);},i*40);
  }
  doShake(6);sfxMeteor();
  return count;
}
function applyRainbow(col){
  let count=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(grid[r][c]===col){grid[r][c]=-1;count++}
  sfxRainbow();
  return count;
}
function applyHammer(r,c){
  let count=0;
  for(let i=0;i<cols;i++){if(grid[r][i]>=0){grid[r][i]=-1;count++}}
  for(let i=0;i<rows;i++){if(grid[i][c]>=0){grid[i][c]=-1;count++}}
  const rect=canvas.getBoundingClientRect();
  spawnParticles(rect.left+gap+Math.floor(cols/2)*(CELL+gap)+CELL/2,rect.top+gap+r*(CELL+gap)+CELL/2,12,"#90caf9",CELL*.3);
  doShake(4);sfxHammer();
  return count;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

// ============ GRAVITY ============
function gravity(){
  for(let c=0;c<cols;c++){
    let wr=rows-1;
    for(let r=rows-1;r>=0;r--)if(grid[r][c]!==-1){grid[wr][c]=grid[r][c];wr--}
    for(let r=wr;r>=0;r--)grid[r][c]=randCol();
  }
}

// ============ PROCESS MATCHES ============
async function processMatches(fromPower=false){
  let matched,loopCount=0,gemsClearedThisRound=0;
  do{
    matched=findMatches();
    if(matched.size===0)break;
    loopCount++;combo++;
    const pts=matched.size*10*Math.min(combo,10);
    score+=pts;totalScore+=pts;gemsClearedThisRound+=matched.size;
    sfxMatch(Math.min(loopCount,5));
    const arr=[...matched];
    const midR=Math.floor(arr.reduce((s,k)=>s+parseInt(k.split(",")[0]),0)/arr.length);
    const midC=Math.floor(arr.reduce((s,k)=>s+parseInt(k.split(",")[1]),0)/arr.length);
    const rect=canvas.getBoundingClientRect();
    showFloating(rect.left+gap+midC*(CELL+gap)+CELL/2,rect.top+gap+midR*(CELL+gap),combo>1?"🔥x"+combo+" +"+pts:"+"+pts);
    for(const k of matched){const[p,q]=k.split(",").map(Number);grid[p][q]=-1}
    draw();await sleep(160);
    gravity();draw();await sleep(200);
  }while(hasMatches());
  if(!hasMatches())combo=0;
  // grant power-ups based on gems cleared
  if(gemsClearedThisRound>0)grantPowerProgress(gemsClearedThisRound);
  updateUI();
  // check win
  if(score>=target&&!paused){
    await levelWin();
  }
}
function grantPowerProgress(count){
  for(const type of ["bomb","meteor","hammer","rainbow"]){
    gemsForPower[type]+=count;
    if(gemsForPower[type]>=POWER_THRESHOLDS[type]){
      gemsForPower[type]-=POWER_THRESHOLDS[type];
      powerCounts[type]++;
      const rect=canvas.getBoundingClientRect();
      const icons={bomb:"💣",meteor:"☄️",hammer:"🔨",rainbow:"🌈"};
      showFloating(rect.left+canvas.width/2,rect.top+100,icons[type]+"+1");
      if(type==="bomb"){beep(700,.08,"sine",.05);setTimeout(()=>beep(900,.1,"sine",.06),80)}
      else if(type==="meteor"){beep(900,.06,"sine",.05);setTimeout(()=>beep(1100,.08,"sine",.05),60)}
      else if(type==="hammer"){beep(300,.1,"triangle",.06)}
      else{beep(600,.08,"sine",.05);setTimeout(()=>beep(800,.08,"sine",.05),80)}
    }
  }
  updateUI();
}

// ============ LEVEL FLOW ============
async function levelWin(){
  paused=true;stopTimer();
  doShake(3);sfxLevelUp();spawnConfetti();
  overlay.innerHTML='<div style="text-align:center"><div style="font-size:48px">🎉</div><div>通关！</div>';
  if(level<LEVELS.length-1){
    overlay.innerHTML+='<button class="btn-next" id="btnNext">▶ 下一关</button>';
  }else{
    overlay.innerHTML+='<div style="font-size:20px;margin-top:10px">🏆 全部通关！</div><button class="btn-restart" id="btnFinalRestart">🔄 重新开始</button>';
  }
  overlay.classList.add("interactive");
  await sleep(300);
  const btnNext=document.getElementById("btnNext");
  const btnRestart=document.getElementById("btnFinalRestart");
  if(btnNext)btnNext.addEventListener("click",async()=>{
    overlay.classList.remove("interactive");overlay.innerHTML="";
    level++;startLevel();
    await countdown();
  });
  if(btnRestart)btnRestart.addEventListener("click",()=>{
    overlay.classList.remove("interactive");overlay.innerHTML="";
    restartGame();
  });
}
function levelFail(){
  paused=true;stopTimer();
  doShake(5);sfxTimeUp();
  overlay.innerHTML='<div style="text-align:center"><div style="font-size:48px">⏰</div><div>时间到！</div><button class="btn-retry" id="btnRetry">🔄 重玩此关</button></div>';
  overlay.classList.add("interactive");
  setTimeout(()=>{
    const btnRetry=document.getElementById("btnRetry");
    if(btnRetry)btnRetry.addEventListener("click",async()=>{
      overlay.classList.remove("interactive");overlay.innerHTML="";
      levelFailed=false;paused=false;
      startLevel();
      await countdown();
    });
  },300);
}
async function countdown(){
  for(let i=3;i>=1;i--){
    overlay.innerHTML='<div style="font-size:72px">'+i+'</div>';
    sfxCountdown();
    await sleep(700);
  }
  overlay.innerHTML='<div style="font-size:56px;color:#4caf50">开始！</div>';sfxGo();
  await sleep(500);
  overlay.innerHTML="";startTimer();
}
function startTimer(){
  stopTimer();
  timeLeft=LEVELS[level].time;
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=0){stopTimer();levelFail();}
  },1000);
}
function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
}
function updateTimerDisplay(){
  const el=document.getElementById("timerDisp");
  el.textContent=timeLeft+"s";
  if(timeLeft<=15)el.classList.add("warn");else el.classList.remove("warn");
}

// ============ POWER ACTIVATION ============
function activatePower(type){
  if(animating||paused)return;
  if(powerCounts[type]<=0){sfxFail();return}
  if(powerMode===type){powerMode=null;updateUI();draw();return}
  if(type==="rainbow"){
    powerCounts.rainbow--;powerMode=null;
    animating=true;
    const col=Math.floor(Math.random()*numColors);
    const cleared=applyRainbow(col);
    score+=cleared*5;totalScore+=cleared*5;
    draw();updateUI();
    setTimeout(async()=>{gravity();draw();await sleep(200);await processMatches(true);animating=false;updateUI()},200);
    return;
  }
  if(type==="meteor"){
    powerCounts.meteor--;powerMode=null;
    animating=true;
    const cleared=applyMeteor();
    score+=cleared*5;totalScore+=cleared*5;
    draw();updateUI();
    setTimeout(async()=>{gravity();draw();await sleep(300);await processMatches(true);animating=false;updateUI()},300);
    return;
  }
  powerMode=type;selR=-1;selC=-1;updateUI();draw();
}

// ============ CLICK ============
canvas.addEventListener("click",async e=>{
  if(animating||paused)return;
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const c=Math.floor((x-gap)/(CELL+gap)),r=Math.floor((y-gap)/(CELL+gap));
  if(r<0||r>=rows||c<0||c>=cols)return;
  if(powerMode){
    if(powerCounts[powerMode]<=0)return;
    animating=true;powerCounts[powerMode]--;powerMode=null;
    let cleared=0;
    if(powerMode==="bomb"||!powerMode)cleared=applyBomb(r,c);
    else if(powerMode==="hammer")cleared=applyHammer(r,c);
    score+=cleared*5;totalScore+=cleared*5;
    selR=-1;selC=-1;updateUI();draw();
    await sleep(400);gravity();draw();await sleep(200);
    await processMatches(true);animating=false;updateUI();return;
  }
  if(selR===-1){selR=r;selC=c;sfxSelect();draw();updateUI();return}
  if(r===selR&&c===selC){selR=-1;selC=-1;draw();updateUI();return}
  if(Math.abs(r-selR)+Math.abs(c-selC)!==1){selR=r;selC=c;sfxSelect();draw();updateUI();return}
  animating=true;sfxSwap();
  swapR1=selR;swapC1=selC;swapR2=r;swapC2=c;swapT=Date.now();draw();
  await sleep(180);
  const ok=await doSwap(selR,selC,r,c);
  swapR1=-1;swapC1=-1;swapR2=-1;swapC2=-1;selR=-1;selC=-1;
  if(!ok){[grid[r][c],grid[selR===r?selR:r][selC===c?selC:c]]=[grid[selR===r?selR:r][selC===c?selC:c],grid[r][c]];sfxFail();draw();animating=false;updateUI();return}
  draw();await processMatches();
  animating=false;updateUI();
});

// ============ UI ============
function updateUI(){
  document.getElementById("score").textContent=score;
  document.getElementById("target").textContent=target;
  document.getElementById("comboDisp").textContent=combo>0?"x"+(combo+1):"x1";
  document.getElementById("cntBomb").textContent=powerCounts.bomb;
  document.getElementById("cntMeteor").textContent=powerCounts.meteor;
  document.getElementById("cntHammer").textContent=powerCounts.hammer;
  document.getElementById("cntRainbow").textContent=powerCounts.rainbow;
  document.getElementById("levelInfo").innerHTML="第<strong>"+(level+1)+"</strong>关："+LEVELS[level].name;
  const pct=Math.min(100,Math.floor(score/target*100));
  document.getElementById("progressBar").style.width=pct+"%";
  // progress bars
  document.getElementById("progBomb").style.width=Math.min(100,gemsForPower.bomb/POWER_THRESHOLDS.bomb*100)+"%";
  document.getElementById("progMeteor").style.width=Math.min(100,gemsForPower.meteor/POWER_THRESHOLDS.meteor*100)+"%";
  document.getElementById("progHammer").style.width=Math.min(100,gemsForPower.hammer/POWER_THRESHOLDS.hammer*100)+"%";
  document.getElementById("progRainbow").style.width=Math.min(100,gemsForPower.rainbow/POWER_THRESHOLDS.rainbow*100)+"%";
  // active power
  ["bomb","meteor","hammer","rainbow"].forEach(t=>{
    const el=document.getElementById("pow"+t.charAt(0).toUpperCase()+t.slice(1));
    if(powerMode===t)el.classList.add("active");else el.classList.remove("active");
  });
  // dots
  let dots="";
  for(let i=0;i<LEVELS.length;i++){
    let cls="level-dot";
    if(i<level)cls+=" done";else if(i===level)cls+=" current";
    dots+='<div class="'+cls+'"></div>';
  }
  document.getElementById("levelDots").innerHTML=dots;
}
function showFloating(x,y,txt){
  const el=document.createElement("div");el.className="floating-text";
  el.textContent=txt;el.style.left=x+"px";el.style.top=y+"px";
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function startLevel(){
  rows=LEVELS[level].rows;cols=LEVELS[level].cols;
  numColors=LEVELS[level].colors;target=LEVELS[level].target;
  score=0;combo=0;paused=false;levelFailed=false;
  selR=-1;selC=-1;powerMode=null;animating=false;
  swapR1=-1;swapC1=-1;swapR2=-1;swapC2=-1;
  resize();newGrid();draw();updateUI();
}

function restartGame(){
  stopTimer();
  level=0;totalScore=0;
  powerCounts={bomb:1,meteor:1,hammer:1,rainbow:0};
  gemsForPower={bomb:0,meteor:0,hammer:0,rainbow:0};
  paused=false;levelFailed=false;
  overlay.classList.remove("interactive");overlay.innerHTML="";
  startLevel();
  // countdown for first level too
  countdown();
}

// init
resize();startLevel();countdown();
</script>

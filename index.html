<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 消消乐 - Match 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:"Microsoft YaHei","PingFang SC",sans-serif;overflow-y:auto;
  user-select:none;-webkit-user-select:none;padding:16px;
}
.wrapper{
  display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;
  justify-content:center;max-width:800px;
}
h1{
  color:#fff;font-size:clamp(20px,3vw,30px);text-align:center;width:100%;
  text-shadow:0 0 20px rgba(255,200,50,.5);letter-spacing:4px;margin-bottom:4px;
}
.header{width:100%;text-align:center}
.board-area{display:flex;flex-direction:column;align-items:center}
#game-container{
  background:rgba(255,255,255,.04);border-radius:16px;padding:8px;
  box-shadow:0 0 40px rgba(100,150,255,.15),inset 0 0 20px rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.08);
}
canvas{display:block;border-radius:10px;touch-action:manipulation;cursor:pointer}
.sidebar{
  background:rgba(255,255,255,.06);border-radius:16px;padding:20px;
  border:1px solid rgba(255,255,255,.1);color:#ddd;min-width:220px;
  max-width:260px;font-size:13px;line-height:1.7;
  box-shadow:0 0 30px rgba(100,150,255,.1);
}
.sidebar h3{color:#ffd700;font-size:16px;margin-bottom:10px;text-align:center}
.sidebar h4{color:#ff9944;margin:12px 0 6px;font-size:13px}
.sidebar p{margin-bottom:4px;color:#bbb}
.power-item{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:rgba(255,255,255,.05);border-radius:8px;margin-bottom:5px;
  cursor:pointer;transition:all .15s;border:1px solid transparent;
}
.power-item:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
.power-item .icon{font-size:22px}
.power-item .count{color:#ffd700;font-weight:700;margin-left:auto}
.power-item.active{border-color:#ffd700!important;box-shadow:0 0 12px rgba(255,200,0,.4)}
.level-bar{
  display:flex;gap:4px;margin:8px 0;justify-content:center;
}
.level-dot{
  width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.15);
  transition:all .3s;
}
.level-dot.done{background:#4caf50;box-shadow:0 0 8px rgba(76,175,80,.5)}
.level-dot.current{background:#ffd700;box-shadow:0 0 10px rgba(255,200,0,.6)}
.info-row{display:flex;justify-content:space-between;margin:2px 0}
.info-row .val{color:#fff;font-weight:700}
.progress-bg{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:8px 0}
.progress-fill{background:linear-gradient(90deg,#ff6b6b,#ffd700);height:100%;
  border-radius:10px;transition:width .3s}
.btn{
  display:block;width:100%;margin-top:10px;padding:9px;font-size:14px;border:none;
  border-radius:20px;cursor:pointer;font-weight:700;transition:all .2s;
  background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(102,126,234,.5)}
.floating-text{
  position:fixed;pointer-events:none;font-weight:900;font-size:26px;
  color:#ffd700;text-shadow:0 0 10px rgba(255,200,0,.8);z-index:100;
  animation:floatUp .9s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-70px) scale(1.4)}
}
</style>
</head>
<body>
<div class="wrapper">
<div class="header"><h1>✨ 消消乐</h1></div>
<div class="board-area">
<div id="game-container"><canvas id="c"></canvas></div>
<div class="level-bar" id="levelDots"></div>
</div>
<div class="sidebar" id="sidebar">
<h3>📖 游戏说明</h3>
<p>点击一个宝石选中，再点<span style="color:#ffd700">相邻</span>宝石交换</p>
<p>三个以上同色连成一线即消除得分</p>
<h4>🎯 道具（点击激活）</h4>
<div class="power-item" id="powBomb" onclick="activatePower('bomb')">
<span class="icon">💣</span>炸弹 - 炸掉周围3×3<span class="count" id="cntBomb">0</span></div>
<div class="power-item" id="powMeteor" onclick="activatePower('meteor')">
<span class="icon">☄️</span>流星 - 随机砸5个<span class="count" id="cntMeteor">0</span></div>
<div class="power-item" id="powRainbow" onclick="activatePower('rainbow')">
<span class="icon">🌈</span>彩虹 - 清一种颜色<span class="count" id="cntRainbow">0</span></div>
<div class="power-item" id="powHammer" onclick="activatePower('hammer')">
<span class="icon">🔨</span>锤子 - 砸十字范围<span class="count" id="cntHammer">0</span></div>
<h4>🏆 关卡</h4>
<div id="levelInfo"></div>
<div class="progress-bg"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
<div class="info-row"><span>得分</span><span class="val" id="score">0</span></div>
<div class="info-row"><span>目标</span><span class="val" id="target">500</span></div>
<div class="info-row"><span>连击</span><span class="val" id="comboDisp">x1</span></div>
<button class="btn" onclick="restartGame()">🔄 重新开始</button>
</div>
</div>

<script>
// ============ CONFIG ============
const LEVELS=[
  {rows:8,cols:8,colors:5,target:500, name:"新手村"},
  {rows:8,cols:8,colors:6,target:1000,name:"小试牛刀"},
  {rows:9,cols:9,colors:6,target:2000,name:"渐入佳境"},
  {rows:9,cols:9,colors:7,target:3500,name:"高手过招"},
  {rows:10,cols:10,colors:7,target:5000,name:"终极挑战"},
];

const GEM_COLORS=[
  ["#ff4444","#ff6666","#cc0000"], // red
  ["#ff8800","#ffaa44","#cc6600"], // orange
  ["#ffdd00","#ffee55","#ccaa00"], // yellow
  ["#44cc44","#66ee66","#228822"], // green
  ["#4488ff","#66aaff","#0044cc"], // blue
  ["#cc44ff","#dd77ff","#8800cc"], // purple
  ["#ff6699","#ff88bb","#cc3366"], // pink
];
const GEM_SHAPES=["●","◆","★","▲","⬟","⬢","♣"];

let grid=[],rows,cols,numColors,score=0,target=0,combo=0,level=0;
let selR=-1,selC=-1,animating=false,levelCleared=false;
let powerMode=null; // bomb|meteor|rainbow|hammer|null
let powerCounts={bomb:1,meteor:1,rainbow:0,hammer:1};
let totalScore=0;
let swapR1=-1,swapC1=-1,swapR2=-1,swapC2=-1,swapT=0;

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let CELL,gap,OX,OY;

// ============ AUDIO ============
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx;
function beep(freq,dur,type="square",vol=.06){
  if(!actx)actx=new AudioCtx();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function sfxSelect(){beep(600,.08,"sine",.06)}
function sfxSwap(){beep(400,.06,"triangle",.05);setTimeout(()=>beep(600,.06,"triangle",.05),60)}
function sfxMatch(n){beep(500+n*80,.12,"square",.07)}
function sfxFail(){beep(150,.15,"sawtooth",.04)}
function sfxPower(){beep(800,.06,"sine",.08);setTimeout(()=>beep(1000,.06,"sine",.08),60);setTimeout(()=>beep(1200,.08,"sine",.08),120)}
function sfxLevelUp(){beep(523,.1,"sine",.08);setTimeout(()=>beep(659,.1,"sine",.08),100);setTimeout(()=>beep(784,.15,"sine",.08),200)}

// ============ RESIZE ============
function resize(){
  const maxW=Math.min(window.innerWidth-300,440);
  const maxH=Math.min(window.innerHeight-180,440);
  const size=Math.min(maxW,maxH);
  const c=LEVELS[level].cols,r=LEVELS[level].rows;
  gap=Math.floor(size*.025);
  CELL=Math.floor((size-gap*(c+1))/Math.max(c,r));
  canvas.width=CELL*c+gap*(c+1);
  canvas.height=CELL*r+gap*(r+1);
  OX=0;OY=0;
}
window.addEventListener("resize",()=>{resize();draw()});

// ============ GRID ============
function newGrid(){
  rows=LEVELS[level].rows;cols=LEVELS[level].cols;numColors=LEVELS[level].colors;
  grid=Array.from({length:rows},()=>Array.from({length:cols},()=>randCol()));
  while(hasMatches()){for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isMatch(r,c))grid[r][c]=randCol()}
}
function randCol(){return Math.floor(Math.random()*numColors)}
function hasMatches(){
  for(let r=0;r<rows;r++)for(let c=0;c<cols-2;c++)if(grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2])return true;
  for(let r=0;r<rows-2;r++)for(let c=0;c<cols;c++)if(grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c])return true;
  return false
}
function isMatch(r,c){
  const v=grid[r][c];if(v<0)return false;
  if(c<cols-2&&v===grid[r][c+1]&&v===grid[r][c+2])return true;
  if(c>0&&c<cols-1&&v===grid[r][c-1]&&v===grid[r][c+1])return true;
  if(c>1&&v===grid[r][c-2]&&v===grid[r][c-1])return true;
  if(r<rows-2&&v===grid[r+1][c]&&v===grid[r+2][c])return true;
  if(r>0&&r<rows-1&&v===grid[r-1][c]&&v===grid[r+1][c])return true;
  if(r>1&&v===grid[r-2][c]&&v===grid[r-1][c])return true;
  return false
}
function findMatches(){
  const m=new Set();
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(isMatch(r,c))m.add(r+","+c);
  return m
}

// ============ DRAW ============
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // grid cells
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=gap+c*(CELL+gap),y=gap+r*(CELL+gap);
    const v=grid[r][c];
    // cell bg
    ctx.fillStyle=(r+c)%2===0?"rgba(255,255,255,.04)":"rgba(0,0,0,.08)";
    ctx.beginPath();roundRect(x,y,CELL,CELL,6);ctx.fill();
    // gem
    if(v>=0){
      const pal=GEM_COLORS[v];
      // glow
      const grad=ctx.createRadialGradient(x+CELL*.35,y+CELL*.3,CELL*.05,x+CELL*.5,y+CELL*.5,CELL*.55);
      grad.addColorStop(0,pal[1]);grad.addColorStop(.7,pal[0]);grad.addColorStop(1,pal[2]);
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,CELL*.38,0,Math.PI*2);ctx.fill();
      // highlight
      ctx.fillStyle="rgba(255,255,255,.25)";
      ctx.beginPath();ctx.arc(x+CELL*.38,y+CELL*.35,CELL*.12,0,Math.PI*2);ctx.fill();
    }
    // selection highlight
    if((r===selR&&c===selC)||(r===swapR1&&c===swapC1)){
      ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.shadowColor="rgba(255,255,255,.8)";ctx.shadowBlur=10;
      ctx.beginPath();roundRect(x-1,y-1,CELL+2,CELL+2,8);ctx.stroke();
      ctx.shadowBlur=0;
    }
  }
  // swap animation
  if(swapR1>=0&&swapR2>=0){
    const now=Date.now();
    const dur=180;let t=(now-swapT)/dur;if(t>1)t=1;
    const v1=grid[swapR1]?.[swapC1]??-1,v2=grid[swapR2]?.[swapC2]??-1;
    const x1=gap+swapC1*(CELL+gap),y1=gap+swapR1*(CELL+gap);
    const x2=gap+swapC2*(CELL+gap),y2=gap+swapR2*(CELL+gap);
    const cx1=x1+(x2-x1)*t,cy1=y1+(y2-y1)*t;
    const cx2=x2+(x1-x2)*t,cy2=y2+(y1-y2)*t;
    drawGem(v1,cx1,cy1);drawGem(v2,cx2,cy2);
  }
}
function drawGem(v,x,y){
  if(v<0)return;
  const pal=GEM_COLORS[v];
  const grad=ctx.createRadialGradient(x+CELL*.35,y+CELL*.3,CELL*.05,x+CELL*.5,y+CELL*.5,CELL*.55);
  grad.addColorStop(0,pal[1]);grad.addColorStop(.7,pal[0]);grad.addColorStop(1,pal[2]);
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,CELL*.38,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.25)";
  ctx.beginPath();ctx.arc(x+CELL*.38,y+CELL*.35,CELL*.12,0,Math.PI*2);ctx.fill();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ============ SWAP ============
async function doSwap(r1,c1,r2,c2){
  [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
  const m=findMatches();
  if(m.size===0){[grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];return false}
  return true
}

// ============ POWER EFFECTS ============
function applyBomb(r,c){
  const changed=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]>=0){
      changed.push([nr,nc,grid[nr][nc]]);
      grid[nr][nc]=-1;
    }
  }
  return changed;
}
function applyMeteor(){
  const candidates=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(grid[r][c]>=0)candidates.push([r,c]);
  shuffle(candidates);
  const count=Math.min(5,candidates.length);
  const changed=[];
  for(let i=0;i<count;i++){
    const[r,c]=candidates[i];
    changed.push([r,c,grid[r][c]]);
    grid[r][c]=-1;
  }
  return changed;
}
function applyRainbow(col){
  const changed=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(grid[r][c]===col){changed.push([r,c,col]);grid[r][c]=-1}
  return changed;
}
function applyHammer(r,c){
  const changed=[];
  for(let i=0;i<cols;i++){if(grid[r][i]>=0){changed.push([r,i,grid[r][i]]);grid[r][i]=-1}}
  for(let i=0;i<rows;i++){if(grid[i][c]>=0){changed.push([i,c,grid[i][c]]);grid[i][c]=-1}}
  return changed;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

// ============ GRAVITY & REFILL ============
function gravity(){
  for(let c=0;c<cols;c++){
    let wr=rows-1;
    for(let r=rows-1;r>=0;r--)if(grid[r][c]!==-1){grid[wr][c]=grid[r][c];wr--}
    for(let r=wr;r>=0;r--)grid[r][c]=randCol();
  }
}

// ============ PROCESS MATCHES ============
async function processMatches(fromPower=false){
  let matched,loopCount=0;
  do{
    matched=findMatches();
    if(matched.size===0)break;
    loopCount++;
    combo++;
    const pts=matched.size*10*Math.min(combo,10);
    score+=pts;totalScore+=pts;
    sfxMatch(Math.min(loopCount,5));
    // floating text
    const arr=[...matched];
    const midR=Math.floor(arr.reduce((s,k)=>s+parseInt(k.split(",")[0]),0)/arr.length);
    const midC=Math.floor(arr.reduce((s,k)=>s+parseInt(k.split(",")[1]),0)/arr.length);
    const rect=canvas.getBoundingClientRect();
    const fx=rect.left+gap+midC*(CELL+gap)+CELL/2;
    const fy=rect.top+gap+midR*(CELL+gap);
    showFloating(fx,fy,combo>1?"🔥x"+combo+" +"+pts:"+"+pts);
    updateUI();
    // mark matched
    for(const k of matched){const[p,q]=k.split(",").map(Number);grid[p][q]=-1}
    draw();await sleep(180);
    gravity();draw();await sleep(220);
    // grant power-ups
    if(totalScore>=300&&powerCounts.bomb===0&&!fromPower){powerCounts.bomb++;sfxPower();showFloating(fx,fy-40,"💣+1")}
    if(totalScore>=600&&powerCounts.meteor===0&&!fromPower){powerCounts.meteor++;sfxPower();showFloating(fx,fy-40,"☄️+1")}
    if(totalScore>=1000&&powerCounts.rainbow===0){powerCounts.rainbow++;sfxPower();showFloating(fx,fy-40,"🌈+1")}
    if(totalScore>=400&&powerCounts.hammer===0&&!fromPower){powerCounts.hammer++;sfxPower();showFloating(fx,fy-40,"🔨+1")}
    updateUI();
  }while(hasMatches());
  if(!hasMatches())combo=0;
  updateUI();
  // check level complete
  if(score>=target&&!levelCleared){
    levelCleared=true;
    if(level<LEVELS.length-1){
      sfxLevelUp();
      setTimeout(()=>{level++;startLevel()},1200);
    }else{
      sfxLevelUp();
      setTimeout(()=>{alert("🎉 恭喜！你通关了！\n最终得分: "+totalScore);restartGame()},800);
    }
  }
}

// ============ POWER ACTIVATION ============
function activatePower(type){
  if(animating||levelCleared)return;
  if(powerCounts[type]<=0){sfxFail();return}
  if(powerMode===type){powerMode=null;updateUI();draw();return}
  // rainbow can be activated without clicking board
  if(type==="rainbow"){
    powerCounts.rainbow--;powerMode=null;sfxPower();
    animating=true;
    const col=Math.floor(Math.random()*numColors);
    const changed=applyRainbow(col);
    score+=changed.length*5;totalScore+=changed.length*5;
    draw();
    setTimeout(async()=>{gravity();draw();await sleep(200);await processMatches(true);animating=false;updateUI()},200);
    updateUI();return;
  }
  if(type==="meteor"){
    powerCounts.meteor--;powerMode=null;sfxPower();
    animating=true;
    const changed=applyMeteor();
    score+=changed.length*5;totalScore+=changed.length*5;
    draw();
    setTimeout(async()=>{gravity();draw();await sleep(200);await processMatches(true);animating=false;updateUI()},200);
    updateUI();return;
  }
  powerMode=type;selR=-1;selC=-1;updateUI();draw();
}

// ============ CLICK HANDLER ============
canvas.addEventListener("click",async e=>{
  if(animating||levelCleared)return;
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const c=Math.floor((x-gap)/(CELL+gap)),r=Math.floor((y-gap)/(CELL+gap));
  if(r<0||r>=rows||c<0||c>=cols)return;

  // power mode?
  if(powerMode){
    if(powerCounts[powerMode]<=0)return;
    animating=true;powerCounts[powerMode]--;sfxPower();
    let changed=[];
    if(powerMode==="bomb")changed=applyBomb(r,c);
    else if(powerMode==="hammer")changed=applyHammer(r,c);
    score+=changed.length*5;totalScore+=changed.length*5;
    powerMode=null;selR=-1;selC=-1;updateUI();draw();
    await sleep(200);gravity();draw();await sleep(200);
    await processMatches(true);animating=false;updateUI();return;
  }

  // normal selection
  if(selR===-1){selR=r;selC=c;sfxSelect();draw();updateUI();return}
  if(r===selR&&c===selC){selR=-1;selC=-1;draw();updateUI();return}
  if(Math.abs(r-selR)+Math.abs(c-selC)!==1){selR=r;selC=c;sfxSelect();draw();updateUI();return}

  // swap
  animating=true;sfxSwap();
  swapR1=selR;swapC1=selC;swapR2=r;swapC2=c;swapT=Date.now();
  draw();
  await sleep(180);
  swapR1=-1;swapC1=-1;swapR2=-1;swapC2=-1;
  const ok=await doSwap(selR,selC,r,c);
  selR=-1;selC=-1;
  if(ok){draw();await processMatches()}
  else{sfxFail();draw()}
  animating=false;updateUI();
});

// ============ UI ============
function updateUI(){
  document.getElementById("score").textContent=score;
  document.getElementById("target").textContent=target;
  document.getElementById("comboDisp").textContent=combo>0?"x"+(combo+1):"x1";
  document.getElementById("cntBomb").textContent=powerCounts.bomb;
  document.getElementById("cntMeteor").textContent=powerCounts.meteor;
  document.getElementById("cntRainbow").textContent=powerCounts.rainbow;
  document.getElementById("cntHammer").textContent=powerCounts.hammer;
  document.getElementById("levelInfo").innerHTML="第<strong>"+(level+1)+"</strong>关："+LEVELS[level].name;
  const pct=Math.min(100,Math.floor(score/target*100));
  document.getElementById("progressBar").style.width=pct+"%";
  // active power highlight
  ["bomb","meteor","rainbow","hammer"].forEach(t=>{
    const el=document.getElementById("pow"+t.charAt(0).toUpperCase()+t.slice(1));
    if(powerMode===t)el.classList.add("active");else el.classList.remove("active");
  });
  // level dots
  let dots="";
  for(let i=0;i<LEVELS.length;i++){
    let cls="level-dot";
    if(i<level)cls+=" done";
    else if(i===level)cls+=" current";
    dots+='<div class="'+cls+'"></div>';
  }
  document.getElementById("levelDots").innerHTML=dots;
}

function showFloating(x,y,txt){
  const el=document.createElement("div");el.className="floating-text";
  el.textContent=txt;el.style.left=x+"px";el.style.top=y+"px";
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function startLevel(){
  rows=LEVELS[level].rows;cols=LEVELS[level].cols;
  numColors=LEVELS[level].colors;target=LEVELS[level].target;
  score=0;combo=0;levelCleared=false;
  selR=-1;selC=-1;powerMode=null;animating=false;
  swapR1=-1;swapC1=-1;swapR2=-1;swapC2=-1;
  resize();newGrid();draw();updateUI();
}

function restartGame(){
  level=0;totalScore=0;
  powerCounts={bomb:1,meteor:1,rainbow:0,hammer:1};
  startLevel();
}

// init
resize();startLevel();
</script>
</body>
</html>
